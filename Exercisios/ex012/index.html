<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Esse video ta hospedado no meu proprio servidor</p>
    <video width="560" controls poster="imagens/images.jpeg">
        <source src="midia/Meu-Video.webm" type="video/mp4">
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/Meu-Video.m4v" type="video/webm">
        <p>Seu navegador não tem compatibilidade para reprodução <a href="midia/meu-video.mp4">Clique aqui para dowloading</a></p>
    </video>
    <h1>Inserindo vieos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/XH-feR1Qm8s?si=ykmuSG8ruvPXdQv_" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
