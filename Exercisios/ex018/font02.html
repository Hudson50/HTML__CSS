<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fontes externas</title>
    <style>
        @font-face {
            font-family: 'love';
            src: url('fontes/love story ttf.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
                tipos de format:
                - opentype (otf)
                - truetype (ttf)
                - enbedded-opentype
                - truetyp-aat (Apple Advanced typography )
                - svg
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Love</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Officia, maiores perspiciatis. Error asperiores iste eveniet pariatur quis eos placeat architecto adipisci aspernatur eligendi unde animi iure distinctio, explicabo quisquam commodi.</p>
</body>
</html>
