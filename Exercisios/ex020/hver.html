<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
            color: white;
            background-color: rgba(255, 0, 0, 0.347);
            width: 200px;
        }
    </style>

</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passa o mouse sobre o texto abaixo</p>
    <div>
        Passa o mouse aqui
        <p><a href="https://www.youtube.com/watch?v=64MJbnoC0Fk" target="_blank" rel="external">link</a></p>
    </div>
</body>
</html>
